name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app
          else
            sudo xcode-select -s /Applications/Xcode.app
          fi
          xcodebuild -version

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install iOS workload
        run: dotnet workload install ios

      - name: Import signing certificate
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p actions "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p actions "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        if: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 != '' }}
        env:
          APPLE_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/tmlios.mobileprovision"
          echo -n "$APPLE_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

      - name: Restore
        run: dotnet restore src/TMLiOS.App/TMLiOS.App.csproj

      - name: Build signed IPA
        if: ${{ secrets.CODESIGN_KEY != '' && secrets.CODESIGN_PROVISION != '' }}
        env:
          CODESIGN_KEY: ${{ secrets.CODESIGN_KEY }}
          CODESIGN_PROVISION: ${{ secrets.CODESIGN_PROVISION }}
        run: |
          dotnet publish src/TMLiOS.App/TMLiOS.App.csproj \
            -c Release \
            -f net8.0-ios \
            -r ios-arm64 \
            /p:BuildIpa=true \
            /p:ArchiveOnBuild=true \
            /p:PublishTrimmed=false \
            /p:MtouchLink=None \
            /p:UseInterpreter=true \
            /p:MtouchInterpreter=-all \
            /p:CodesignKey="$CODESIGN_KEY" \
            /p:CodesignProvision="$CODESIGN_PROVISION"

      - name: Build app bundle without explicit signing secrets
        if: ${{ secrets.CODESIGN_KEY == '' || secrets.CODESIGN_PROVISION == '' }}
        run: |
          dotnet build src/TMLiOS.App/TMLiOS.App.csproj \
            -c Release \
            -f net8.0-ios \
            -r ios-arm64 \
            /p:BuildIpa=false \
            /p:PublishTrimmed=false \
            /p:MtouchLink=None \
            /p:UseInterpreter=true \
            /p:MtouchInterpreter=-all

      - name: Collect artifacts
        if: always()
        run: |
          mkdir -p artifacts
          find src -name "*.ipa" -exec cp {} artifacts/ \; || true
          find src -name "*.app" -maxdepth 8 -type d -exec ditto -c -k --sequesterRsrc --keepParent {} artifacts/app-bundle.zip \; || true
          find src -path "*/bin/Release/*" -type f -name "*.dll" -exec cp {} artifacts/ \; || true
          ls -la artifacts || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TMLiOS-build-artifacts
          path: artifacts
