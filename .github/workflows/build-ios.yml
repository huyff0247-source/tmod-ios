name: Build iOS

on:
  workflow_dispatch:
    inputs:
      package_mode:
        description: Package mode
        required: true
        default: adhoc-ipa
        type: choice
        options:
          - adhoc-ipa
          - app-bundle
          - signed-ipa
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

permissions:
  contents: read

env:
  PROJECT_PATH: src/TMLiOS.App/TMLiOS.App.csproj
  DOTNET_VERSION: 8.0.x
  TARGET_FRAMEWORK: net8.0-ios
  RUNTIME_ID: ios-arm64
  CODESIGN_KEY: ${{ secrets.CODESIGN_KEY }}
  CODESIGN_PROVISION: ${{ secrets.CODESIGN_PROVISION }}
  APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
  APPLE_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}

jobs:
  build-ios:
    name: Build iOS app
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app
          else
            sudo xcode-select -s /Applications/Xcode.app
          fi
          xcodebuild -version

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install iOS workload
        run: dotnet workload install ios

      - name: Import Apple signing certificate
        if: ${{ inputs.package_mode == 'signed-ipa' && env.APPLE_CERTIFICATE_BASE64 != '' }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p actions "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p actions "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$KEYCHAIN_PATH"

      - name: Install Apple provisioning profile
        if: ${{ inputs.package_mode == 'signed-ipa' && env.APPLE_PROVISION_PROFILE_BASE64 != '' }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/tmlios.mobileprovision"
          echo -n "$APPLE_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

      - name: Restore
        run: dotnet restore "$PROJECT_PATH"

      - name: Publish ad-hoc app bundle
        if: ${{ inputs.package_mode == 'adhoc-ipa' || inputs.package_mode == 'app-bundle' }}
        run: |
          dotnet publish "$PROJECT_PATH" \
            -c "${{ inputs.configuration }}" \
            -f "$TARGET_FRAMEWORK" \
            -r "$RUNTIME_ID" \
            /p:BuildIpa=false \
            /p:ArchiveOnBuild=false \
            /p:PublishTrimmed=false \
            /p:MtouchLink=None \
            /p:UseInterpreter=true \
            /p:MtouchInterpreter=-all \
            /p:CodesignKey=- \
            /p:CodesignEntitlements=Platforms/iOS/Entitlements.plist

      - name: Publish signed IPA
        if: ${{ inputs.package_mode == 'signed-ipa' && env.CODESIGN_KEY != '' && env.CODESIGN_PROVISION != '' }}
        run: |
          dotnet publish "$PROJECT_PATH" \
            -c "${{ inputs.configuration }}" \
            -f "$TARGET_FRAMEWORK" \
            -r "$RUNTIME_ID" \
            /p:BuildIpa=true \
            /p:ArchiveOnBuild=true \
            /p:PublishTrimmed=false \
            /p:MtouchLink=None \
            /p:UseInterpreter=true \
            /p:MtouchInterpreter=-all \
            /p:CodesignEntitlements=Platforms/iOS/Entitlements.plist \
            /p:CodesignKey="$CODESIGN_KEY" \
            /p:CodesignProvision="$CODESIGN_PROVISION"

      - name: Stop if signed secrets are missing
        if: ${{ inputs.package_mode == 'signed-ipa' && (env.CODESIGN_KEY == '' || env.CODESIGN_PROVISION == '') }}
        run: |
          echo "signed-ipa mode requires CODESIGN_KEY and CODESIGN_PROVISION secrets."
          exit 1

      - name: Collect app bundle
        if: always()
        run: |
          mkdir -p artifacts
          APP_PATH=$(find src/TMLiOS.App/bin -type d -name "*.app" | head -n 1 || true)
          if [ -n "$APP_PATH" ]; then
            echo "Found app: $APP_PATH"
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" artifacts/TMLiOS-app-bundle.zip
            codesign -d --entitlements :- "$APP_PATH" > artifacts/entitlements.txt 2>&1 || true
          fi

      - name: Package ad-hoc IPA
        if: ${{ inputs.package_mode == 'adhoc-ipa' }}
        run: |
          APP_PATH=$(find src/TMLiOS.App/bin -type d -name "*.app" | head -n 1 || true)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found."
            exit 1
          fi

          rm -rf artifacts/Payload
          mkdir -p artifacts/Payload
          ditto "$APP_PATH" artifacts/Payload/$(basename "$APP_PATH")
          cd artifacts
          zip -qry TMLiOS-adhoc.ipa Payload
          rm -rf Payload

      - name: Collect signed IPA
        if: always()
        run: |
          find src/TMLiOS.App/bin -type f -name "*.ipa" -exec cp {} artifacts/ \; || true
          ls -la artifacts

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TMLiOS-${{ inputs.package_mode }}-${{ inputs.configuration }}
          path: artifacts
